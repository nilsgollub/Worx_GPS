<!DOCTYPE html>
<html>
<head>
    <title>Live GPS Position</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    <!-- Leaflet.RotatedMarker Plugin JavaScript (LOKAL) -->
    <script src="/static/leaflet.rotatedMarker.js"></script>
    <!-- Socket.IO Client Library -->
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        #map { height: 100%; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    document.addEventListener('DOMContentLoaded', (event) => {
        // Daten vom Flask-Template übernehmen
        const initialLat = {{ initial_lat }};
        const initialLon = {{ initial_lon }};
        const initialZoom = {{ initial_zoom }};
        const maxZoom = {{ max_zoom }};
        const googleTilesUrl = '{{ google_tiles_url|safe }}';
        const googleAttr = '{{ google_attr|safe }}';
        const osmTilesUrl = '{{ osm_tiles_url|safe }}';
        const osmAttr = '{{ osm_attr|safe }}';

        // Karte initialisieren
        const map = L.map('map').setView([initialLat, initialLon], initialZoom);

        // Kachel-Layer hinzufügen
        const googleLayer = L.tileLayer(googleTilesUrl, {
            attribution: googleAttr,
            maxZoom: maxZoom,
            maxNativeZoom: 20
        }).addTo(map);

        const osmLayer = L.tileLayer(osmTilesUrl, {
            attribution: osmAttr,
            maxZoom: maxZoom
        });

        // Layer-Kontrolle hinzufügen
        const baseMaps = {
            "Google Satellite": googleLayer,
            "OpenStreetMap": osmLayer
        };
        L.control.layers(baseMaps).addTo(map);

        // Marker für die aktuelle Position
        let currentMarker = null;
        let previousLatLng = null;

        // Hilfsfunktion zur Berechnung des Winkels (Bearing)
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1) * Math.PI / 180;
            lat1 = lat1 * Math.PI / 180;
            lat2 = lat2 * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) -
                Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
            let brng = Math.atan2(y, x) * 180 / Math.PI;
            brng = (brng + 360) % 360;
            return brng;
        }

        // Eigenes Icon
        const mowerIcon = L.icon({
            iconUrl: '/static/worx.png',
            iconSize:     [25, 32],
            iconAnchor:   [12.5, 16],
            popupAnchor:  [0, -18]
        });

        // Socket.IO Verbindung
        const socket = io();

        socket.on('connect', () => {
            console.info('Verbunden mit WebSocket Server'); // Info statt log
        });

        socket.on('disconnect', () => {
            console.info('Verbindung zum WebSocket Server getrennt'); // Info statt log
        });

        socket.on('update_position', (data) => {
            // console.log('Positionsupdate erhalten:', data); // Entfernt
            const lat = data.lat;
            const lon = data.lon;

            if (lat !== undefined && lon !== undefined) {
                const newLatLng = L.latLng(lat, lon);
                let bearing = 0;

                if (currentMarker) {
                    // Nur berechnen und rotieren, wenn sich die Position geändert hat
                    if (previousLatLng && (previousLatLng.lat !== newLatLng.lat || previousLatLng.lng !== newLatLng.lng)) {
                        bearing = calculateBearing(previousLatLng.lat, previousLatLng.lng, newLatLng.lat, newLatLng.lng);
                        // Rotation mit Plugin setzen
                        if (currentMarker.setRotationAngle) {
                            currentMarker.setRotationAngle(bearing);
                        } else {
                            console.error("FEHLER: currentMarker.setRotationAngle ist nicht verfügbar!"); // Wichtiger Fehler bleibt
                        }
                    }
                    // Marker-Position aktualisieren
                    currentMarker.setLatLng(newLatLng);
                } else {
                    // Ersten Marker erstellen
                    currentMarker = L.marker(newLatLng, {
                        icon: mowerIcon,
                        rotationAngle: 0, // Initialer Winkel
                        rotationOrigin: 'center center'
                    }).addTo(map);
                    currentMarker.bindPopup("Aktuelle Position");
                }

                // Aktuelle Position als vorherige speichern
                previousLatLng = newLatLng;

                // Optional: Karte zentrieren
                if (!map.getBounds().contains(newLatLng)) {
                    map.setView(newLatLng);
                }
            } else {
                console.warn("Ungültige Positionsdaten empfangen:", data); // Warnung bleibt sinnvoll
            }
        });

    }); // Ende des DOMContentLoaded Listeners
</script>

</body>
</html>
