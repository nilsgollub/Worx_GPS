<!-- templates/live_map.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Live GPS Position</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <!-- Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
    <!-- Socket.IO Client Library -->
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        #map { height: 100%; width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
    // Daten vom Flask-Template übernehmen
    const initialLat = {{ initial_lat }};
    const initialLon = {{ initial_lon }};
    const initialZoom = {{ initial_zoom }};
    const maxZoom = {{ max_zoom }};
    const googleTilesUrl = '{{ google_tiles_url|safe }}';
    const googleAttr = '{{ google_attr|safe }}';
    const osmTilesUrl = '{{ osm_tiles_url|safe }}';
    const osmAttr = '{{ osm_attr|safe }}';

    // Karte initialisieren
    const map = L.map('map').setView([initialLat, initialLon], initialZoom);

    // Kachel-Layer hinzufügen (Google Satellite als Standard)
    const googleLayer = L.tileLayer(googleTilesUrl, {
        attribution: googleAttr,
        maxZoom: maxZoom, // Maximale Zoomstufe übernehmen
        maxNativeZoom: 20 // Google liefert nativ oft bis 20, Leaflet zoomt dann weiter
    }).addTo(map);

    const osmLayer = L.tileLayer(osmTilesUrl, {
        attribution: osmAttr,
        maxZoom: maxZoom
    });

    // Layer-Kontrolle hinzufügen
    const baseMaps = {
        "Google Satellite": googleLayer,
        "OpenStreetMap": osmLayer
    };
    L.control.layers(baseMaps).addTo(map);

    // Marker für die aktuelle Position
    let currentMarker = null;
    // Optional: eigenes Icon verwenden
    // const mowerIcon = L.icon({
    //     iconUrl: '/static/marker-icon.png', // Pfad zu Ihrem Icon in 'static'
    //     iconSize:     [32, 32], // Größe des Icons
    //     iconAnchor:   [16, 32], // Punkt des Icons, der zur Marker-Position korrespondiert
    //     popupAnchor:  [0, -32] // Punkt, von dem Popups relativ zum Icon öffnen
    // });

    // Socket.IO Verbindung herstellen
    // Verbindet sich automatisch mit dem Server, von dem die Seite geladen wurde
    const socket = io();

    socket.on('connect', () => {
        console.log('Verbunden mit WebSocket Server');
    });

    socket.on('disconnect', () => {
        console.log('Verbindung zum WebSocket Server getrennt');
    });

    socket.on('update_position', (data) => {
        console.log('Positionsupdate erhalten:', data);
        const lat = data.lat;
        const lon = data.lon;

        if (lat !== undefined && lon !== undefined) {
            const newLatLng = L.latLng(lat, lon);

            if (currentMarker) {
                // Marker aktualisieren
                currentMarker.setLatLng(newLatLng);
            } else {
                // Ersten Marker erstellen
                currentMarker = L.marker(newLatLng/*, {icon: mowerIcon} */).addTo(map); // Optional: eigenes Icon
                currentMarker.bindPopup("Aktuelle Position");
            }

            // Optional: Karte auf die neue Position zentrieren, wenn sie sich außerhalb des aktuellen Blickfelds befindet
            // oder immer zentrieren: map.setView(newLatLng);
            // oder sanft verschieben: map.panTo(newLatLng);

            // Beispiel: Zentriere nur, wenn der Marker das erste Mal gesetzt wird
            if (!map.getBounds().contains(newLatLng)) {
                 // map.panTo(newLatLng); // Sanftes Verschieben
                 map.setView(newLatLng); // Direkt springen (ggf. besser bei großen Sprüngen)
            }
        } else {
            console.warn("Ungültige Positionsdaten empfangen:", data);
        }
    });

</script>

</body>
</html>
