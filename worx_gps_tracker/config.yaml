name: Worx GPS Tracker
version: 1.0.3
slug: worx_gps_tracker
description: Ein Add-on zur Auswertung von GPS-Daten des Worx Rasenmäherroboters
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
boot: manual
hassio_api: true
host_network: true
map:
  - config
init: false
options:
  env_file: /app/.env
  output_dir: /config/www/worx_gps_tracker
schema:
  env_file:
    type: string
    required: true
  output_dir:
    type: string
    required: true
