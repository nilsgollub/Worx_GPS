<!DOCTYPE html>
<html>
<head>
    <title>Test Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map {
            height: 400px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Test map initialization
        console.log('Initializing test map...');
        
        const map = L.map('map').setView([46.77763883, 7.1625345], 15);
        
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://osm.org/copyright">OSM</a> contributors'
        }).addTo(map);
        
        // Add a test marker
        const marker = L.marker([46.77763883, 7.1625345]).addTo(map)
            .bindPopup('Test Position')
            .openPopup();
            
        console.log('Test map initialized successfully');
    </script>
</body>
</html>
